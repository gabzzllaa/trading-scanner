name: Trading Pipeline

on:
  schedule:
    # All times UTC. SGT = UTC+8, ET = UTC-4 (EDT) / UTC-5 (EST)
    # US market hours: 9:30–10:30 AM ET = 13:30–14:30 UTC (EDT)

    # ---- Gap-fade strategy (daily, weekdays) ----

    # 19:30 SGT = 11:30 UTC — Morning scanner (pre-market scan)
    - cron: '30 11 * * 1-5'

    # 21:15 SGT = 13:15 UTC — Agents pre-market queue
    - cron: '15 13 * * 1-5'

    # 21:30 SGT = 13:30 UTC — Market open — place orders
    - cron: '30 13 * * 1-5'

    # 21:45 SGT = 13:45 UTC — Monitor 1
    - cron: '45 13 * * 1-5'

    # 22:00 SGT = 14:00 UTC — Monitor 2
    - cron: '0 14 * * 1-5'

    # 22:15 SGT = 14:15 UTC — Monitor 3
    - cron: '15 14 * * 1-5'

    # 22:30 SGT = 14:30 UTC — Time stop close
    - cron: '30 14 * * 1-5'

    # 04:30 SGT next day = 20:30 UTC — Summary (after US market close at 4 PM ET)
    - cron: '30 20 * * 1-5'

    # ---- IRS strategy (weekly Sunday + daily Form 4 check) ----

    # 22:00 SGT Sunday = 14:00 UTC Sunday — IRS weekly scan
    - cron: '0 14 * * 0'

    # 22:30 SGT Sunday = 14:30 UTC Sunday — IRS agent monitor (exit checks)
    - cron: '30 14 * * 0'

    # 19:00 SGT weekdays = 11:00 UTC — IRS daily Form 4 check
    - cron: '0 11 * * 1-5'

    # 21:30 SGT Mon = 13:30 UTC Mon — IRS entry orders (Monday only)
    - cron: '30 13 * * 1'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode to run manually'
        required: true
        default: 'summary'
        type: choice
        options:
          - scanner
          - premarket
          - open
          - monitor
          - close
          - summary
          - irs_weekly
          - irs_daily
          - irs_entry
          - irs_monitor

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Write config.yaml
        run: |
          cat > config.yaml << 'EOF'
          capital_usd: 10000
          risk_per_trade_pct: 0.0100
          max_daily_loss_pct: 0.0200
          time_stop_et: "10:30 AM ET"
          time_stop_sgt: "10:30 PM SGT"
          market_open_et: "9:30 AM ET"
          market_open_sgt: "9:30 PM SGT"
          telegram_enabled: true
          data_dir: scanner/data
          watchlist_file: scanner/data/watchlist.json
          latest_scan_file: scanner/data/latest_scan.json
          history_dir: scanner/data/history
          finviz_rate_min_s: 0.8
          finviz_rate_max_s: 1.5
          alpaca_api_key: "${{ secrets.ALPACA_API_KEY }}"
          alpaca_secret_key: "${{ secrets.ALPACA_SECRET_KEY }}"
          bagholder:
            tier_a_plus_min: 35
            tier_monitor_min: 20
            stop_loss_pct: 0.10
            c1_decline_10: 80
            c1_decline_9:  60
            c1_decline_7:  50
            c1_decline_4:  40
            c1_decline_2:  30
            c2_price_5:    1
            c2_price_4:    3
            c2_price_3:    5
            c2_price_2:    10
            c2_mktcap_5:   50
            c2_mktcap_4:   200
            c2_mktcap_3:   500
            c2_mktcap_2:   1000
            c2_mktcap_1:   2000
            c3_short_10:   30
            c3_short_8:    20
            c3_short_7:    15
            c3_short_6:    10
            c3_short_3:    5
            c4_gap_10:     100
            c4_gap_9:      75
            c4_gap_8:      50
            c4_gap_7:      40
            c4_gap_6:      30
            c4_gap_3:      20
            c6_vol_10:     20
            c6_vol_9:      15
            c6_vol_8:      10
            c6_vol_7:      7
            c6_vol_6:      5
            c6_vol_4:      3
            c6_vol_2:      2
            watchlist_max_price: 10
            watchlist_min_short_float: 10
            watchlist_max_perf_6m: -30
            watchlist_min_avg_vol: 100000
            watchlist_max_stocks: 80
            watchlist_stale_days: 7
          EOF

      - name: Determine mode from schedule
        id: mode
        run: |
          # Manual trigger
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Determine mode from current UTC hour/minute/day
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          DOW=$(date -u +%u)   # 1=Mon ... 7=Sun
          TIME="${HOUR}:${MIN}"

          # ---- IRS strategy (Sunday = DOW 7) ----
          if [[ "$DOW" == "7" && "$TIME" == "14:00" ]]; then
            echo "mode=irs_weekly" >> $GITHUB_OUTPUT
          elif [[ "$DOW" == "7" && "$TIME" == "14:30" ]]; then
            echo "mode=irs_monitor" >> $GITHUB_OUTPUT

          # ---- IRS daily Form 4 check (weekdays 11:00) ----
          elif [[ "$DOW" != "7" && "$DOW" != "6" && "$TIME" == "11:00" ]]; then
            echo "mode=irs_daily" >> $GITHUB_OUTPUT

          # ---- IRS entry orders (Monday only 13:30) ----
          elif [[ "$DOW" == "1" && ( "$TIME" == "13:30" || "$TIME" == "13:3"* ) ]]; then
            echo "mode=irs_entry" >> $GITHUB_OUTPUT

          # ---- Gap-fade strategy (weekdays) ----
          elif [[ "$TIME" == "11:30" || "$TIME" == "11:3"* ]]; then
            echo "mode=scanner" >> $GITHUB_OUTPUT
          elif [[ "$TIME" == "13:15" || "$TIME" == "13:1"* ]]; then
            echo "mode=premarket" >> $GITHUB_OUTPUT
          elif [[ "$TIME" == "13:30" || "$TIME" == "13:3"* ]]; then
            echo "mode=open" >> $GITHUB_OUTPUT
          elif [[ "$TIME" == "13:45" || "$TIME" == "14:00" || "$TIME" == "14:15" ]]; then
            echo "mode=monitor" >> $GITHUB_OUTPUT
          elif [[ "$TIME" == "14:30" || "$TIME" == "14:3"* ]]; then
            echo "mode=close" >> $GITHUB_OUTPUT
          elif [[ "$TIME" == "20:30" || "$TIME" == "20:3"* ]]; then
            echo "mode=summary" >> $GITHUB_OUTPUT
          else
            echo "mode=summary" >> $GITHUB_OUTPUT
          fi

      - name: Daily health check
        if: steps.mode.outputs.mode == 'scanner'
        run: python scanner/healthcheck.py || true

      - name: Run morning scanner
        if: steps.mode.outputs.mode == 'scanner'
        run: python scanner/scanner.py --mode morning

      - name: Agents — premarket queue
        if: steps.mode.outputs.mode == 'premarket'
        run: python scanner/alpaca_agent.py --agent all --mode premarket

      - name: Agents — market open orders
        if: steps.mode.outputs.mode == 'open'
        run: python scanner/alpaca_agent.py --agent all --mode open

      - name: Agents — monitor positions
        if: steps.mode.outputs.mode == 'monitor'
        run: python scanner/alpaca_agent.py --agent all --mode monitor

      - name: Agents — time stop close
        if: steps.mode.outputs.mode == 'close'
        run: python scanner/alpaca_agent.py --agent all --mode close

      - name: Agents — session summary
        if: steps.mode.outputs.mode == 'summary'
        run: python scanner/alpaca_agent.py --agent all --mode summary

      # ---- IRS strategy steps ----

      - name: IRS — weekly scan
        if: steps.mode.outputs.mode == 'irs_weekly'
        run: python scanner/irs_scanner.py --mode weekly

      - name: IRS — daily Form 4 check
        if: steps.mode.outputs.mode == 'irs_daily'
        run: python scanner/irs_scanner.py --mode daily

      - name: IRS — entry orders (Monday)
        if: steps.mode.outputs.mode == 'irs_entry'
        run: python scanner/irs_agent.py --mode entry

      - name: IRS — weekly monitor (exit checks)
        if: steps.mode.outputs.mode == 'irs_monitor'
        run: python scanner/irs_agent.py --mode monitor

      - name: Save scan data to repo
        if: |
          steps.mode.outputs.mode == 'scanner' ||
          steps.mode.outputs.mode == 'summary'  ||
          steps.mode.outputs.mode == 'irs_weekly' ||
          steps.mode.outputs.mode == 'irs_daily'
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@trading-scanner"
          git add scanner/data/latest_scan.json scanner/data/history/ || true
          git add scanner/data/irs_watchlist.json scanner/data/irs_state.json scanner/data/irs_positions.json || true