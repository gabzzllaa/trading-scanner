name: Trading Scanner

on:
  schedule:
    # All times in UTC. Singapore (SGT) = UTC+8, EDT = UTC-4.
    # ── Bagholder pre-market scanner (6–9 AM ET = 10–13 UTC) ──
    - cron: '0 10 * * 1-5'   # 6:00 PM SGT / 6:00 AM ET
    - cron: '0 11 * * 1-5'   # 7:00 PM SGT / 7:00 AM ET
    - cron: '0 12 * * 1-5'   # 8:00 PM SGT / 8:00 AM ET
    - cron: '0 13 * * 1-5'   # 9:00 PM SGT / 9:00 AM ET  ← 30 min before open
    # ── Bagholder paper trader lifecycle ──
    - cron: '30 13 * * 1-5'  # 9:30 PM SGT / 9:30 AM ET  ← market open
    - cron: '45 13 * * 1-5'  # 9:45 PM SGT / 9:45 AM ET  ← Bagholder monitor + ORF scan
    - cron: '0 14 * * 1-5'   # 10:00 PM SGT / 10:00 AM ET ← Bagholder monitor + ORF monitor
    - cron: '15 14 * * 1-5'  # 10:15 PM SGT / 10:15 AM ET ← Bagholder monitor
    - cron: '30 14 * * 1-5'  # 10:30 PM SGT / 10:30 AM ET ← Bagholder close + ORF monitor
    - cron: '0 15 * * 1-5'   # 11:00 PM SGT / 11:00 AM ET ← Bagholder summary + ORF close
    - cron: '30 15 * * 1-5'  # 11:30 PM SGT / 11:30 AM ET ← ORF summary
    # ── Sunday: weekly watchlist refresh ──
    - cron: '0 12 * * 0'     # 8:00 PM SGT (Sunday)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Bagholder scanner mode'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - morning
          - watchlist
          - full
      paper_mode:
        description: 'Bagholder paper trader mode'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - premarket
          - open
          - monitor
          - close
          - summary
      orf_mode:
        description: 'ORF scanner mode'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - scan
          - monitor
          - close
          - summary
      earnings_mode:
        description: 'Earnings Fade scanner mode'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - scan
          - open
          - monitor
          - close
          - summary

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scanner/requirements.txt

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: scanner/data
          key: scanner-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            scanner-data-${{ runner.os }}-

      - name: Determine run mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          DAY=$(date -u +%u)  # 1=Mon ... 7=Sun
          EVENT="${{ github.event_name }}"

          # ── Manual trigger ──
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "scanner_mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            echo "paper_mode=${{ inputs.paper_mode }}" >> $GITHUB_OUTPUT
            echo "orf_mode=${{ inputs.orf_mode }}" >> $GITHUB_OUTPUT
            echo "earnings_mode=${{ inputs.earnings_mode }}" >> $GITHUB_OUTPUT
            echo "run_scanner=$([ -n '${{ inputs.mode }}' ] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "run_paper=$([ -n '${{ inputs.paper_mode }}' ] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "run_orf=$([ -n '${{ inputs.orf_mode }}' ] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "run_earnings=$([ -n '${{ inputs.earnings_mode }}' ] && echo true || echo false)" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ── Sunday = watchlist only ──
          if [ "$DAY" = "7" ]; then
            echo "scanner_mode=watchlist" >> $GITHUB_OUTPUT
            echo "paper_mode=" >> $GITHUB_OUTPUT
            echo "orf_mode=" >> $GITHUB_OUTPUT
            echo "earnings_mode=" >> $GITHUB_OUTPUT
            echo "run_scanner=true" >> $GITHUB_OUTPUT
            echo "run_paper=false" >> $GITHUB_OUTPUT
            echo "run_orf=false" >> $GITHUB_OUTPUT
            echo "run_earnings=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ── Weekday schedule routing ──
          #
          # Bagholder schedule:
          #   10,11,12,13:00 UTC  → scanner morning + paper premarket
          #   13:30 UTC           → paper open
          #   13:45, 14:00, 14:15 → paper monitor
          #   14:30               → paper close
          #   15:00               → paper summary
          #
          # ORF schedule:
          #   13:45 UTC           → orf scan  (9:45 AM ET = 15 min after open)
          #   14:00, 14:30 UTC    → orf monitor
          #   15:00 UTC           → orf close
          #   15:30 UTC           → orf summary
          #
          # Earnings Fade schedule:
          #   10,11,12,13:00 UTC  → earnings scan (pre-market, 6–9 AM ET)
          #   13:30 UTC           → earnings open (9:30 AM ET — record open prices)
          #   14:00, 14:30 UTC    → earnings monitor (10:00, 10:30 AM ET)
          #   15:00 UTC           → earnings close (11:00 AM ET — time stop)
          #   15:30 UTC           → earnings summary (11:30 AM ET)

          SCANNER_MODE=""
          PAPER_MODE=""
          ORF_MODE=""
          EARNINGS_MODE=""
          RUN_SCANNER=false
          RUN_PAPER=false
          RUN_ORF=false
          RUN_EARNINGS=false

          # Use ranges (±15 min) to handle GitHub Actions cron delays
          HHMM=$((HOUR * 60 + MIN))

          if [ "$HOUR" = "10" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "12" ]; then
            SCANNER_MODE=morning;  RUN_SCANNER=true
            PAPER_MODE=premarket;  RUN_PAPER=true
            EARNINGS_MODE=scan;    RUN_EARNINGS=true

          elif [ "$HHMM" -ge 765 ] && [ "$HHMM" -le 795 ]; then   # 13:00 ±15
            SCANNER_MODE=morning;  RUN_SCANNER=true
            PAPER_MODE=premarket;  RUN_PAPER=true
            EARNINGS_MODE=scan;    RUN_EARNINGS=true

          elif [ "$HHMM" -ge 796 ] && [ "$HHMM" -le 824 ]; then   # 13:30 ±15 (up to 13:44)
            PAPER_MODE=open;       RUN_PAPER=true
            EARNINGS_MODE=open;    RUN_EARNINGS=true

          elif [ "$HHMM" -ge 825 ] && [ "$HHMM" -le 839 ]; then   # 13:45 ±7 (narrow)
            PAPER_MODE=monitor;    RUN_PAPER=true
            ORF_MODE=scan;         RUN_ORF=true

          elif [ "$HHMM" -ge 840 ] && [ "$HHMM" -le 854 ]; then   # 14:00 ±7
            PAPER_MODE=monitor;    RUN_PAPER=true
            ORF_MODE=monitor;      RUN_ORF=true
            EARNINGS_MODE=monitor; RUN_EARNINGS=true

          elif [ "$HHMM" -ge 855 ] && [ "$HHMM" -le 869 ]; then   # 14:15 ±7
            PAPER_MODE=monitor;    RUN_PAPER=true

          elif [ "$HHMM" -ge 870 ] && [ "$HHMM" -le 899 ]; then   # 14:30 ±15
            PAPER_MODE=close;      RUN_PAPER=true
            ORF_MODE=monitor;      RUN_ORF=true
            EARNINGS_MODE=monitor; RUN_EARNINGS=true

          elif [ "$HHMM" -ge 900 ] && [ "$HHMM" -le 929 ]; then   # 15:00 ±15
            PAPER_MODE=summary;    RUN_PAPER=true
            ORF_MODE=close;        RUN_ORF=true
            EARNINGS_MODE=close;   RUN_EARNINGS=true

          elif [ "$HHMM" -ge 930 ] && [ "$HHMM" -le 959 ]; then   # 15:30 ±15
            ORF_MODE=summary;      RUN_ORF=true
            EARNINGS_MODE=summary; RUN_EARNINGS=true

          else
            SCANNER_MODE=morning;  RUN_SCANNER=true
          fi

          echo "scanner_mode=$SCANNER_MODE" >> $GITHUB_OUTPUT
          echo "paper_mode=$PAPER_MODE" >> $GITHUB_OUTPUT
          echo "orf_mode=$ORF_MODE" >> $GITHUB_OUTPUT
          echo "earnings_mode=$EARNINGS_MODE" >> $GITHUB_OUTPUT
          echo "run_scanner=$RUN_SCANNER" >> $GITHUB_OUTPUT
          echo "run_paper=$RUN_PAPER" >> $GITHUB_OUTPUT
          echo "run_orf=$RUN_ORF" >> $GITHUB_OUTPUT
          echo "run_earnings=$RUN_EARNINGS" >> $GITHUB_OUTPUT

      - name: Run Bagholder scanner
        if: steps.mode.outputs.run_scanner == 'true' && steps.mode.outputs.scanner_mode != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: |
          python scanner/scanner.py --mode ${{ steps.mode.outputs.scanner_mode }}

      - name: Run Bagholder paper trader
        if: steps.mode.outputs.run_paper == 'true' && steps.mode.outputs.paper_mode != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: |
          python scanner/paper_trader.py --mode ${{ steps.mode.outputs.paper_mode }}

      - name: Run ORF scanner
        if: steps.mode.outputs.run_orf == 'true' && steps.mode.outputs.orf_mode != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: |
          python scanner/orf_scanner.py --mode ${{ steps.mode.outputs.orf_mode }}

      - name: Run Earnings Fade scanner
        if: steps.mode.outputs.run_earnings == 'true' && steps.mode.outputs.earnings_mode != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: |
          python scanner/earnings_scanner.py --mode ${{ steps.mode.outputs.earnings_mode }}

      - name: Save watchlist artifact
        if: steps.mode.outputs.scanner_mode == 'watchlist'
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-${{ github.run_id }}
          path: scanner/data/watchlist.json
          retention-days: 90

      - name: Save all results artifact
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_id }}
          path: |
            scanner/data/latest_scan.json
            scanner/data/paper_trades.json
            scanner/data/orf_state.json
            scanner/data/orf_paper_trades.json
            scanner/data/earnings_state.json
            scanner/data/earnings_paper_trades.json
            scanner/data/history/
          retention-days: 30
